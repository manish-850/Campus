<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Hub | Campus Care AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-accent: #00f2fe;
            --secondary-accent: #4facfe;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100%; min-height: 100vh;
            background: radial-gradient(circle at top right, #0a192f, #000814);
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- BACKGROUND BLOBS --- */
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .blob {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.1) 0%, transparent 70%);
            border-radius: 50%; animation: float 20s infinite alternate;
        }
        .blob-2 { top: 40%; left: 60%; animation-duration: 25s; animation-direction: reverse; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(120px, 120px) scale(1.1); }
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 700; font-size: 1.5rem; color: var(--primary-accent); letter-spacing: 1px; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-weight: 300; transition: 0.3s; opacity: 0.7; }
        .nav-links a:hover { opacity: 1; color: var(--primary-accent); }

        /* --- HEADER --- */
        .header { text-align: center; padding: 60px 20px 40px; animation: fadeIn 1s ease; }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            background: linear-gradient(to bottom, #fff, var(--secondary-accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* --- HUB LAYOUT --- */
        .hub-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 40px; width: 90%; max-width: 1200px;
            margin: 0 auto 100px; animation: fadeInUp 1s ease;
        }

        .hub-card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            padding: 35px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .hub-card:hover {
            transform: translateY(-10px); border-color: var(--primary-accent);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.1);
        }
        .hub-card h2 { font-size: 1.8rem; margin-bottom: 25px; color: var(--primary-accent); font-weight: 600; }

        /* --- FORM --- */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.85rem; opacity: 0.8; font-weight: 300; }
        input, textarea {
            width: 100%; padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; font-family: 'Outfit', sans-serif; transition: 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary-accent); background: rgba(255, 255, 255, 0.07); }

        .action-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(45deg, var(--secondary-accent), var(--primary-accent));
            border: none; border-radius: 12px; color: #041c4f;
            font-weight: 700; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
        }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- TOAST --- */
        #toast {
            visibility: hidden; min-width: 320px;
            background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--primary-accent); color: white;
            text-align: center; border-radius: 15px; padding: 20px;
            position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        #toast.show { visibility: visible; animation: slideUp 0.5s, slideDown 0.5s 9.5s; }

        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes slideDown { from { bottom: 30px; opacity: 1; } to { bottom: -50px; opacity: 0; } }

        /* --- TRACKING --- */
        .tracking-box { margin-top: 30px; padding-top: 30px; border-top: 1px solid var(--glass-border); display: none; }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { width: 45%; height: 100%; background: var(--primary-accent); box-shadow: 0 0 10px var(--primary-accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) { nav { padding: 20px; } .nav-links { display: none; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="bg-glow">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav>
        <div class="logo">CAMPUS CARE.AI</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="./pages/about.html">About</a></li>
            <li><a href="./pages/admin.html">Admin</a></li>
            <li><a href="./pages/support.html">Support</a></li>
        </ul>
    </nav>

    <section class="header">
        <h1>Complaint Hub</h1>
        <div style="opacity: 0.7; letter-spacing: 2px; font-size: 0.8rem;">SECURE & FAST RESOLUTION</div>
    </section>

    <main class="hub-container">
        
        <div class="hub-card">
            <h2>New Complaint</h2>
            <form id="complaintForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Atul Kumar">
                    </div>
                    <div class="form-group">
                        <label>Registration No.</label>
                        <input type="text" id="regNo" placeholder="e.g. 2025UG1035">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Hostel Block</label>
                        <input type="text" id="block" placeholder="Block-3">
                    </div>
                    <div class="form-group">
                        <label>Room No.</label>
                        <input type="text" id="room" placeholder="503">
                    </div>
                </div>
                <div class="form-group">
                    <label>Issue Description</label>
                    <textarea id="desc" rows="3" placeholder="Explain your problem..."></textarea>
                </div>
                <button type="button" id="submitBtn" class="action-btn">Submit Case</button>
            </form>
        </div>

        <div class="hub-card">
            <h2>Track Status</h2>
            <div class="form-group">
                <label>Complaint Tracking ID</label>
                <input type="text" id="trackInput" placeholder="Enter ID (e.g. #CC-8821)">
            </div>
            <button class="action-btn" onclick="showStatus()">Check Progress</button>
            <div class="tracking-box" id="resultArea">
                <div style="color: var(--primary-accent); font-size: 0.8rem; margin-bottom: 10px;">• IN REVIEW</div>
                <h4 id="displayID">ID: #CC-8821</h4>
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <p style="font-size: 0.85rem; opacity: 0.7;">Assigned to: Maintenance Dept.</p>
            </div>
        </div>

    </main>

    <script>
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerHTML = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 10000);
        }

        // --- BACKEND LINKING LOGIC ---
        async function handleSubmission() {
            const submitBtn = document.getElementById('submitBtn');
            const formData = {
                name: document.getElementById('name').value,
                regNo: document.getElementById('regNo').value,
                block: document.getElementById('block').value,
                room: document.getElementById('room').value,
                desc: document.getElementById('desc').value
            };

            // Basic Validation
            if (Object.values(formData).some(val => val === "")) {
                showToast("⚠️ <b>Wait!</b> Please fill all the details first.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            try {
                /* IMPORTANT: Yahan apna backend endpoint (API URL) daalein.
                   Example: 'http://localhost:5000/api/complaint' ya your-llm-api.com
                */
                const response = await fetch("http://127.0.0.1:8000/submit", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    const data = await response.json();
                    // Maan lijiye aapka backend { "trackingId": "CC-1234" } bhej raha hai
                    const trackingIdFromAI = data.trackingId; 

                    showToast(`✅ <b>Success!</b> Complaint submitted.<br>Tracking ID: <span style="color:var(--primary-accent)">${trackingIdFromAI}</span><br><small>Please note this Tracking ID.</small>`);
                    document.getElementById('complaintForm').reset();
                } else {
                    throw new Error("Backend connection failed");
                }

            } catch (error) {
                console.error("Error:", error);
                showToast("❌ <b>Error!</b> Could not connect to AI Agent. Try again later.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Case";
            }
        }

        function showStatus() {
            const input = document.getElementById('trackInput').value;
            if(input.trim() !== "") {
                document.getElementById('displayID').innerText = "ID: " + input.toUpperCase();
                document.getElementById('resultArea').style.display = 'block';
            } else {
                showToast("❌ Please enter a Tracking ID to search.");
            }
        }
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.addEventListener('click', handleSubmission);
    </script>

</body>
</html>
